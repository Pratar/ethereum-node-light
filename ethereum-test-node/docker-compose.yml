version: '3.8'

services:
  # Ethereum RPC Proxy for Sepolia
  ethereum-proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    container_name: ethereum-test-node
    restart: unless-stopped
    ports:
      - "8545:8545"  # RPC
      - "6060:6060"  # Metrics
    environment:
      - EXTERNAL_RPC_URL=https://ethereum-sepolia.publicnode.com
      - PROXY_PORT=8545
    volumes:
      - ./logs:/logs
    networks:
      - ethereum-network






  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
      - ./monitoring/prometheus/rules:/etc/prometheus/rules
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - ethereum-network
    depends_on:
      - ethereum-proxy

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - ethereum-network
    depends_on:
      - prometheus

  # Node Exporter for system metrics
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - ethereum-network

  # Alert Manager
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - ethereum-network

  # Backup service
  backup:
    image: alpine:latest
    container_name: ethereum-backup
    restart: "no"
    volumes:
      - ethereum-data:/data:ro
      - ./backups:/backups
    environment:
      - BACKUP_RETENTION_DAYS=7
    command: |
      sh -c '
        echo "Starting backup at $$(date)"
        tar -czf /backups/ethereum-backup-$$(date +%Y%m%d-%H%M%S).tar.gz -C /data .
        find /backups -name "ethereum-backup-*.tar.gz" -mtime +$$BACKUP_RETENTION_DAYS -delete
        echo "Backup completed at $$(date)"
      '
    networks:
      - ethereum-network

volumes:
  ethereum-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

networks:
  ethereum-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
