---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cert-manager-crds.yaml
  - cert-manager-rbac.yaml
  - cert-manager-serviceaccount.yaml
  - cert-manager-deployment.yaml
  - cert-manager-webhook.yaml
  - root-ca-secret.yaml
  - ca-cluster-issuer.yaml
  - cluster-issuer.yaml
  - ethereum-certificate.yaml
  - ethereum-tls-secret.yaml
  - grafana-certificate.yaml
  - prometheus-certificate.yaml
  - certificaterequestpolicy-crd.yaml
  - certificaterequestpolicy-ethereum.yaml
  - cert-manager-approver-deployment.yaml

commonAnnotations:
  kustomize.config.k8s.io/needs-hash-suffix: "true"

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/component: ethereum-infrastructure
      app.kubernetes.io/instance: cert-manager
      app.kubernetes.io/name: ethereum-node
      app.kubernetes.io/version: v1.0.0
