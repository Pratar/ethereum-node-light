---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ethereum-route
  namespace: ethereum
  labels:
    app.kubernetes.io/component: gateway-api
    app.kubernetes.io/instance: base
    app.kubernetes.io/name: ethereum-node
    app.kubernetes.io/version: v1.0.0
spec:
  parentRefs:
    - name: ethereum-gateway
      namespace: ethereum
  hostnames:
    - "ethereum.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ethereum-node
          port: 8545
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /debug
      backendRefs:
        - name: ethereum-node
          port: 6060
          weight: 1
