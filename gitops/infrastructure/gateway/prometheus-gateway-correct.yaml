---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: prometheus-gateway
  namespace: monitoring
  labels:
    app.kubernetes.io/component: monitoring-infrastructure
    app.kubernetes.io/instance: base
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/version: v1.0.0
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: prometheus-tls-cert
            namespace: monitoring
      allowedRoutes:
        namespaces:
          from: Same 