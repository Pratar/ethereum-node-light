apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ethereum-ingress
  namespace: ethereum
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: ethereum.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ethereum-node-loadbalancer
                port:
                  number: 8545
---
