apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api-controller
  namespace: istio-system
  labels:
    app: gateway-api-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-api-controller
  template:
    metadata:
      labels:
        app: gateway-api-controller
    spec:
      serviceAccountName: gateway-api-controller
      containers:
        - name: controller
          image: istio/pilot:1.20.0
          command:
            - pilot-discovery
          args:
            - discovery
            - --monitoringAddr=:8080
            - --log_output_level=default:info
            - --domain
            - cluster.local
            - --enable-gateway-api
            - --gateway-api-controller-name=istio.io/gateway-controller
          ports:
            - containerPort: 8080
              name: metrics
          env:
            - name: PILOT_CERT_PROVIDER
              value: istiod
            - name: PILOT_ENABLE_GATEWAY_API
              value: "true"
            - name: PILOT_GATEWAY_API_CONTROLLER_NAME
              value: "istio.io/gateway-controller"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-api-controller
  namespace: istio-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gateway-api-controller
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "gatewayclasses", "httproutes", "grpcroutes", "tlsroutes", "referencegrants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "nodes", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.istio.io"]
    resources: ["gateways", "virtualservices", "destinationrules"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gateway-api-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gateway-api-controller
subjects:
  - kind: ServiceAccount
    name: gateway-api-controller
    namespace: istio-system 