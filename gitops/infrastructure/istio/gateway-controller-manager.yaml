apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-controller-manager
  namespace: istio-system
  labels:
    app: gateway-controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-controller-manager
  template:
    metadata:
      labels:
        app: gateway-controller-manager
    spec:
      serviceAccountName: gateway-controller-manager
      containers:
        - name: manager
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              echo "Gateway Controller Manager starting..."
              # Создаем простой контроллер, который принимает GatewayClass
              kubectl patch gatewayclass istio --type='merge' -p='{"status":{"conditions":[{"type":"Accepted","status":"True","reason":"Accepted","message":"Controller is ready"}]}}'
              while true; do
                echo "Controller manager running..."
                sleep 60
              done
          env:
            - name: KUBECONFIG
              value: "/root/.kube/config"
          volumeMounts:
            - name: kubeconfig
              mountPath: /root/.kube
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: kubeconfig
          secret:
            secretName: kubeconfig
            defaultMode: 0400
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-controller-manager
  namespace: istio-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gateway-controller-manager
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "gatewayclasses", "httproutes", "grpcroutes", "tlsroutes", "referencegrants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "nodes", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gateway-controller-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gateway-controller-manager
subjects:
  - kind: ServiceAccount
    name: gateway-controller-manager
    namespace: istio-system 