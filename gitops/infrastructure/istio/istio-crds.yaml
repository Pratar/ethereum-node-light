apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gateways.networking.istio.io
spec:
  group: networking.istio.io
  names:
    kind: Gateway
    listKind: GatewayList
    plural: gateways
    singular: gateway
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                selector:
                  type: object
                servers:
                  type: array
                  items:
                    type: object
                    properties:
                      port:
                        type: object
                        properties:
                          number:
                            type: integer
                          name:
                            type: string
                          protocol:
                            type: string
                      hosts:
                        type: array
                        items:
                          type: string
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: virtualservices.networking.istio.io
spec:
  group: networking.istio.io
  names:
    kind: VirtualService
    listKind: VirtualServiceList
    plural: virtualservices
    singular: virtualservice
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                hosts:
                  type: array
                  items:
                    type: string
                gateways:
                  type: array
                  items:
                    type: string
                http:
                  type: array
                  items:
                    type: object
                    properties:
                      route:
                        type: array
                        items:
                          type: object
                          properties:
                            destination:
                              type: object
                              properties:
                                host:
                                  type: string
                                port:
                                  type: object
                                  properties:
                                    number:
                                      type: integer 