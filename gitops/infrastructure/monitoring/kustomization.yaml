---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - prometheus-crds.yaml
  - prometheus-config.yaml
  - grafana-dashboards.yaml
  - grafana-datasources.yaml
  - ethereum-grafana-dashboard.yaml
  - grafana-dashboard.yaml

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 58.2.2
    releaseName: monitoring
    namespace: monitoring
    valuesInline:
      grafana:
        enabled: true
        adminPassword: admin123
        persistence:
          enabled: true
          storageClassName: ethereum-storage
          size: 5Gi
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 200m
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: 'ethereum'
                orgId: 1
                folder: ''
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/ethereum
        service:
          type: ClusterIP
        ingress:
          enabled: false
      prometheus:
        enabled: true
        prometheusSpec:
          retention: 7d
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: ethereum-storage
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: 10Gi
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
          serviceMonitorSelectorNilUsesHelmValues: false
          serviceMonitorSelector: {}
          serviceMonitorNamespaceSelector: {}
        service:
          type: ClusterIP
        ingress:
          enabled: false
      alertmanager:
        enabled: true
        alertmanagerSpec:
          retention: 120h
          storage:
            volumeClaimTemplate:
              spec:
                storageClassName: ethereum-storage
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: 5Gi
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 200m
        service:
          type: ClusterIP
        ingress:
          enabled: false
      kube-state-metrics:
        enabled: true
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 100m
      nodeExporter:
        enabled: true
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 100m
      kubelet:
        enabled: true
      serviceMonitor:
        enabled: true

commonAnnotations:
  kustomize.config.k8s.io/needs-hash-suffix: "true"

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/component: ethereum-infrastructure
      app.kubernetes.io/instance: monitoring
      app.kubernetes.io/name: ethereum-node
      app.kubernetes.io/version: v1.0.0
