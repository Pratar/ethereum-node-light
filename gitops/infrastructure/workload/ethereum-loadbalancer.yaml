---
apiVersion: v1
kind: Service
metadata:
  name: ethereum-node-loadbalancer
  namespace: ethereum
  labels:
    app: ethereum-node
    type: loadbalancer
spec:
  type: LoadBalancer
  ports:
    - name: rpc
      port: 8545
      targetPort: 8545
      protocol: TCP
    - name: metrics
      port: 6060
      targetPort: 6060
      protocol: TCP
  selector:
    app: ethereum-node
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: ethereum-node-headless
  namespace: ethereum
  labels:
    app: ethereum-node
    type: headless
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: rpc
      port: 8545
      targetPort: 8545
      protocol: TCP
    - name: p2p
      port: 30303
      targetPort: 30303
      protocol: TCP
    - name: p2p-udp
      port: 30303
      targetPort: 30303
      protocol: UDP
    - name: metrics
      port: 6060
      targetPort: 6060
      protocol: TCP
  selector:
    app: ethereum-node 