---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  annotations:
    app.kubernetes.io/name: ethereum-complete
    app.kubernetes.io/version: v1.0.0
  name: ethereum-complete

resources:
  - infrastructure/
  - workload/

commonAnnotations:
  kustomize.config.k8s.io/needs-hash-suffix: "true"
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/component: ethereum-complete
      app.kubernetes.io/instance: complete
      app.kubernetes.io/name: ethereum-node
      app.kubernetes.io/version: v1.0.0
