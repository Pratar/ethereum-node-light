---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: ethereum-node-prod
  annotations:
    app.kubernetes.io/name: ethereum-node
    app.kubernetes.io/environment: prod

namespace: ethereum

resources:
  - ../../base

patches:
  - path: replicas-patch.yaml
    target:
      kind: StatefulSet
      name: ethereum-node
  - path: resources-patch.yaml
    target:
      kind: StatefulSet
      name: ethereum-node
  - path: security-patch.yaml
    target:
      kind: StatefulSet
      name: ethereum-node

configMapGenerator:
  - name: ethereum-config
    literals:
      - environment=prod
      - log-level=info
      - max-peers=20

secretGenerator:
  - name: ethereum-secrets
    literals:
      - rpc-password=prod-secure-password
      - p2p-key=prod-secure-key

commonLabels:
  app.kubernetes.io/environment: prod
  environment: production

commonAnnotations:
  environment: production
  cost-center: production
  backup: enabled
