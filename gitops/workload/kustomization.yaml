---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  annotations:
    app.kubernetes.io/name: ethereum-workload
    app.kubernetes.io/version: v1.0.0
  name: ethereum-workload

resources:
  - namespaces/
  - deployments/
  - services/
  - autoscaling/
  - secrets/
  - network/

commonAnnotations:
  kustomize.config.k8s.io/needs-hash-suffix: "true"
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/component: ethereum-workload
      app.kubernetes.io/instance: workload
      app.kubernetes.io/name: ethereum-node
      app.kubernetes.io/version: v1.0.0
