---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ethereum-gateway
  namespace: ethereum
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - name: ethereum-tls-cert
            kind: Secret
