---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ethereum-node-monitor
  namespace: ethereum
  labels:
    release: prometheus
    app: ethereum-node
spec:
  selector:
    matchLabels:
      app: ethereum-node
  endpoints:
    - port: metrics
      path: /debug/vars
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: 'go_(.*)'
          action: keep
        - sourceLabels: [__name__]
          regex: 'ethereum_(.*)'
          action: keep
        - sourceLabels: [__name__]
          regex: 'process_(.*)'
          action: keep
        - sourceLabels: [__name__]
          regex: 'http_(.*)'
          action: keep
  namespaceSelector:
    matchNames:
      - ethereum
