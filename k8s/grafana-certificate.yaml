---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls-cert
  namespace: monitoring
spec:
  secretName: grafana-tls-cert
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - "grafana.example.com"
    - "*.grafana.example.com"
  duration: 2160h  # 90 days
  renewBefore: 360h  # 15 days
