---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ethereum-node-network-policy
  namespace: ethereum
  labels:
    app: ethereum-node
    component: security
spec:
  podSelector:
    matchLabels:
      app: ethereum-node
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Разрешить RPC трафик на порт 8545
    - from:
        - namespaceSelector:
            matchLabels:
              name: ethereum
      ports:
        - protocol: TCP
          port: 8545
    # Разрешить P2P трафик на порт 30303
    - from:
        - namespaceSelector:
            matchLabels:
              name: ethereum
      ports:
        - protocol: TCP
          port: 30303
        - protocol: UDP
          port: 30303
    # Разрешить метрики на порт 6060
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 6060
  egress:
    # Разрешить исходящий трафик для DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
    # Разрешить исходящий трафик для HTTP/HTTPS
    - to: []
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    # Разрешить исходящий трафик для P2P
    - to: []
      ports:
        - protocol: TCP
          port: 30303
        - protocol: UDP
          port: 30303
