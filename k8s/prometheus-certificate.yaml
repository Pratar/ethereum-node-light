---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-tls-cert
  namespace: monitoring
spec:
  secretName: prometheus-tls-cert
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - "prometheus.example.com"
    - "*.prometheus.example.com"
  duration: 2160h  # 90 days
  renewBefore: 360h  # 15 days
