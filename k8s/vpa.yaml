---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: ethereum-node-vpa
  namespace: ethereum
  labels:
    app: ethereum-node
    component: autoscaler
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: ethereum-node
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          cpu: "100m"
          memory: 512Mi
        maxAllowed:
          cpu: "4"
          memory: 8Gi
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsAndLimits
