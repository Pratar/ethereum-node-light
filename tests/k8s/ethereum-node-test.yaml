apiVersion: v1
kind: Pod
metadata:
  name: ethereum-node-test
  namespace: ethereum
  labels:
    app: ethereum-node-test
spec:
  containers:
  - name: test
    image: busybox:latest
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "Starting Ethereum node connectivity tests..."
      
      # Тест 1: Проверка доступности сервиса
      echo "Test 1: Service availability"
      if wget -qO- --timeout=10 http://ethereum-node-service:8545 > /dev/null 2>&1; then
        echo "✓ Service is accessible"
      else
        echo "✗ Service is not accessible"
        exit 1
      fi
      
      # Тест 2: Проверка RPC API
      echo "Test 2: RPC API functionality"
      response=$(wget -qO- --timeout=10 --post-data='{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
        --header='Content-Type: application/json' \
        http://ethereum-node-service:8545 2>/dev/null)
      
      if echo "$response" | grep -q "result"; then
        echo "✓ RPC API is working"
      else
        echo "✗ RPC API is not working"
        exit 1
      fi
      
      # Тест 3: Проверка синхронизации
      echo "Test 3: Node synchronization"
      sync_status=$(wget -qO- --timeout=10 --post-data='{"jsonrpc":"2.0","method":"eth_syncing","params":[],"id":1}' \
        --header='Content-Type: application/json' \
        http://ethereum-node-service:8545 2>/dev/null)
      
      if echo "$sync_status" | grep -q "false"; then
        echo "✓ Node is synced"
      else
        echo "⚠ Node is still syncing"
      fi
      
      # Тест 4: Проверка метрик
      echo "Test 4: Metrics endpoint"
      if wget -qO- --timeout=10 http://ethereum-node-service:8545/metrics > /dev/null 2>&1; then
        echo "✓ Metrics endpoint is accessible"
      else
        echo "⚠ Metrics endpoint is not accessible"
      fi
      
      echo "All tests completed successfully!"
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
  restartPolicy: Never
---
apiVersion: v1
kind: Service
metadata:
  name: ethereum-node-test-service
  namespace: ethereum
spec:
  selector:
    app: ethereum-node-test
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP 